<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Você</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', monospace;
        }
        h1 {
            position: absolute;
            top: 20px;
            color: white;
            text-shadow: 0 0 10px #ea80b0;
            letter-spacing: 3px;
            z-index: 100;
        }
        .ui-heart {
            position: relative;
            width: 0; height: 0;
            transform-style: preserve-3d;
            animation: rotateFull 12s linear infinite;
        }
        .love_horizontal {
            position: absolute;
            transform-style: preserve-3d;
        }
        .love_word {
            display: block;
            color: #ea80b0;
            font-size: 1rem;
            text-shadow: 0 0 8px #fff, 0 0 16px #ea80b0;
            white-space: nowrap;
            font-weight: bold;
        }
        @keyframes rotateFull {
            from { transform: rotateX(25deg) rotateY(0deg); }
            to   { transform: rotateX(25deg) rotateY(360deg); }
        }
    </style>
</head>
<body>
    <h1>DESCE AQUI</h1>
    <div class="ui-heart" id="heart"></div>

    <script>
        const heart = document.getElementById('heart');
        const total = 80;

        for (let i = 0; i < total; i++) {
            const t = (i / total) * 2 * Math.PI;

            // Equação paramétrica do coração
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));

            const scale = 13; // Aumente para um coração maior
            const px = x * scale;
            const py = y * scale;

            const layer = document.createElement('div');
            layer.className = 'love_horizontal';
            // Posiciona cada palavra na forma do coração, com rotação para o efeito 3D
            layer.style.transform = `translate(${px}px, ${py}px) rotateY(${i * (360 / total)}deg)`;
            layer.innerHTML = `<span class="love_word">I LOVE YOU</span>`;
            heart.appendChild(layer);
        }
    </script>
</body>
</html>
